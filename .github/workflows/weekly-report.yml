name: ALUXE SG Weekly Sentiment Report

on:
  # 每週一凌晨 00:00 SGT (UTC+8) = UTC Sun 16:00 自動執行
  schedule:
    - cron: '0 16 * * 0'

  # 也可以在 GitHub 手動按「Run workflow」立即觸發
  workflow_dispatch:

jobs:
  run-sentiment-analysis:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # 需要寫入 docs/ 以更新 GitHub Pages

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests cryptography

      # v6：PDF 產生需要 Chrome headless（Ubuntu Runner 預載 chromium）
      - name: Setup Chrome for PDF generation
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run sentiment analysis
        env:
          APIFY_TOKEN:              ${{ secrets.APIFY_TOKEN }}
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:         ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEETS_ID:         ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SERVICE_ACCOUNT:   ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          GOOGLE_DRIVE_FOLDER_ID:   ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          PAGES_URL:                ${{ secrets.PAGES_URL }}
        run: python scripts/run_analysis_sg.py

      - name: Commit updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 不 commit PDF（檔案大、且已經上傳到 Drive 了）
          git add docs/sg_latest.json docs/sg_history.json docs/config.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update SG dashboard $(date -u +%Y-%m-%d)"
          git push
