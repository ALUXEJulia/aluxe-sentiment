<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ALUXE · Sentiment Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--gold:#B8973E;--gold-l:#F5EDD8;--dark:#1A1814;--bg:#FAF9F6;--card:#fff;--border:rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--dark)}
header{background:var(--dark);padding:1.5rem 2rem;display:flex;justify-content:space-between;align-items:center}
h1{font-family:'DM Serif Display',serif;color:var(--gold);font-size:20px;font-weight:400;letter-spacing:.04em}
.tab-bar{background:var(--dark);padding:0 2rem;display:flex;gap:0;border-top:1px solid rgba(255,255,255,.08)}
.tab-btn{color:rgba(255,255,255,.45);font-size:12px;padding:.6rem 1.25rem;cursor:pointer;border-bottom:2px solid transparent;font-family:'DM Sans',sans-serif;background:none;border-top:none;border-left:none;border-right:none;letter-spacing:.04em;transition:all .2s}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-btn:hover{color:rgba(255,255,255,.8)}
.tab-content{display:none}.tab-content.active{display:block}
.wrap{max-width:1060px;margin:0 auto;padding:2rem 1.5rem}
.summary{background:var(--gold-l);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:1rem 1.25rem;font-size:14px;line-height:1.7;color:#3D3A32;margin-bottom:2rem}
.sec{margin-bottom:2.5rem}
.sec-label{font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:#7A7669;margin-bottom:.75rem}
.ts{font-size:10px;color:#aaa;margin-top:.75rem;padding-top:.5rem;border-top:0.5px solid var(--border)}
.ads-banner{background:var(--card);border:1px solid var(--gold);border-radius:12px;padding:1.25rem;margin-bottom:2rem}
.ads-banner-top{display:flex;align-items:center;gap:10px;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:0.5px solid #E8D9A8}
.ads-badge{background:var(--dark);color:var(--gold);font-size:10px;font-weight:500;padding:3px 12px;border-radius:20px;letter-spacing:.08em}
.ads-subtitle{font-size:11px;color:#7A7669}
.ads-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.ad-card{background:#FAF9F6;border:0.5px solid #E8D9A8;border-radius:10px;padding:.875rem}
.ad-brand{font-size:11px;font-weight:500;color:#7A5F10;margin-bottom:2px}
.ad-count-row{display:flex;align-items:baseline;gap:4px;margin-bottom:4px}
.ad-count{font-size:22px;font-weight:500;color:var(--dark)}
.ad-count-lbl{font-size:10px;color:#7A7669}
.ad-cta{font-size:10px;color:#7A7669;border-top:0.5px solid #E8D9A8;padding-top:5px;margin-top:5px}
.ad-cta strong{color:#7A5F10;font-weight:500}
.ad-insight{font-size:10px;color:#555;margin-top:4px;line-height:1.4;border-left:2px solid var(--gold);padding-left:6px}
.ads-ts{font-size:10px;color:#aaa;margin-top:.875rem;padding-top:.625rem;border-top:0.5px solid #E8D9A8}
.ads-divider-label{font-size:10px;font-weight:500;color:#7A5F10;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}
.bc{background:var(--card);border:.5px solid var(--border);border-radius:12px;padding:1.25rem}
.bc.own{border-color:var(--gold);border-width:1.5px}
.own-badge{display:inline-block;font-size:9px;background:var(--gold-l);color:#7A5F10;padding:1px 8px;border-radius:10px;margin-bottom:5px}
.bh{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.bn{font-size:13px;font-weight:500}
.sources{display:flex;gap:4px;margin-bottom:6px}
.src-tag{background:#E6F1FB;color:#185FA5;font-size:10px;padding:1px 7px;border-radius:20px}
.bbar{display:flex;height:5px;border-radius:3px;overflow:hidden;margin-bottom:5px;gap:1px}
.blbl{display:flex;gap:8px;font-size:10px;margin-bottom:7px;align-items:center}
.themes{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.tag{background:#F1EFE8;color:#3D3A32;font-size:10px;padding:2px 8px;border-radius:20px}
.alert-box{background:#FFF0F0;color:#A32D2D;font-size:11px;padding:5px 8px;border-radius:6px;border-left:2px solid #E24B4A;margin-bottom:4px}
.quote{font-size:10px;font-style:italic;margin-top:4px;padding-top:4px;border-top:0.5px solid var(--border);line-height:1.4}
.pos-q{color:#0F6E56}
.neg-q{color:#A32D2D}
.ai,.ti{background:var(--card);border:.5px solid var(--border);border-radius:10px;padding:1rem 1.25rem;margin-bottom:8px}
.act-badge{background:#E1F5EE;color:#085041;font-size:10px;padding:1px 8px;border-radius:20px;font-weight:400}
.action-item{display:flex;gap:12px;align-items:flex-start;padding:.875rem 1.25rem;background:var(--card);border:.5px solid var(--border);border-radius:10px;margin-bottom:8px;font-size:13px;line-height:1.5}
.anum{width:22px;height:22px;border-radius:50%;background:var(--dark);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:1px}
.ext-link{display:inline-block;margin-top:.75rem;font-size:12px;color:var(--gold);text-decoration:none;border:.5px solid var(--gold);padding:4px 14px;border-radius:20px;margin-right:8px}
table tr:hover td{background:#F9F8F5}
footer{text-align:center;font-size:11px;color:#7A7669;padding:2rem;border-top:.5px solid var(--border);margin-top:1rem}
.loading{color:#7A7669;font-size:13px;padding:2rem 0}
</style>
</head>
<body>

<header>
  <h1>ALUXE · Sentiment Monitor</h1>
  <span style="color:#7A7669;font-size:12px" id="header-date"></span>
</header>
<div class="tab-bar" id="tab-bar"></div>
<div id="tab-contents"></div>
<footer>ALUXE Marketing Intelligence · Claude + Apify + Meta Ads</footer>

<script>
const SHEETS_URL = 'https://docs.google.com/spreadsheets/d/1RYZNRb8CGHN_C3QG4z3Vfr-5ZgnKGLfhQ31QZhTdLt8';

// ── 渲染單一地區內容 ──────────────────────────────

function renderMarket(data, marketId) {
  const date = (data.generated_at || '').slice(0, 10);
  if (marketId === 'sg') {
    document.getElementById('header-date').textContent = '報告日期：' + date;
  }

  let html = '';

  // 廣告區塊（SG 有完整廣告資料）
  const ads = data.competitor_ads || {};
  if (Object.keys(ads).length > 0) {
    let ownHtml = '', compHtml = '';
    Object.entries(ads).forEach(([brand, ad]) => {
      const themes = (ad.main_themes || []).map(t => `<span class="tag">${t}</span>`).join('');
      const offers = (ad.key_offers || []).map(o => `<span class="tag" style="background:#E1F5EE;color:#085041">${o}</span>`).join('');
      const plats = (ad.platforms || []).join(' · ');
      const isOwn = ad.own;
      const card = `<div class="ad-card" style="${isOwn ? 'border-color:var(--gold);border-width:1.5px;' : ''}">
        ${isOwn ? '<span style="font-size:9px;background:var(--gold-l);color:#7A5F10;padding:1px 8px;border-radius:10px;margin-bottom:4px;display:inline-block">自家品牌</span>' : ''}
        <div class="ad-brand">${brand}</div>
        <div class="ad-count-row"><span class="ad-count">${ad.ad_count || 0}</span><span class="ad-count-lbl">則現役廣告</span></div>
        <div style="font-size:10px;color:#7A5F10;margin-bottom:6px">${plats}</div>
        <div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:5px">${themes}</div>
        <div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px">${offers}</div>
        <div class="ad-cta">主打 CTA：<strong>${ad.cta_focus || ''}</strong></div>
        <div class="ad-insight">${ad.strategy_insight || ''}</div>
      </div>`;
      if (isOwn) ownHtml += card;
      else compHtml += card;
    });
    html += `<div class="ads-banner">
      <div class="ads-banner-top">
        <span class="ads-badge">廣告監控</span>
        <span class="ads-subtitle">Meta 廣告資料庫 · 自動更新 · 自家品牌 + 競品</span>
      </div>
      ${ownHtml ? `<div style="margin-bottom:.875rem"><div class="ads-divider-label">自家品牌</div><div style="display:grid;grid-template-columns:minmax(0,1fr);gap:8px">${ownHtml}</div></div>` : ''}
      ${compHtml ? `<div><div class="ads-divider-label">競品</div><div class="ads-grid">${compHtml}</div></div>` : '<p style="color:#7A7669;font-size:13px">無廣告資料</p>'}
      <div class="ads-ts">來源：Meta 廣告資料庫</div>
    </div>`;
  }

  // 整體摘要
  if (data.summary) {
    html += `<div class="summary">${data.summary}</div>`;
  }

  // 品牌情感分析
  const brands = data.brands || {};
  if (Object.keys(brands).length > 0) {
    let cardsHtml = '';
    Object.entries(brands).forEach(([name, d]) => {
      const sc = d.sentiment_score || 0;
      const col = sc >= 0.7 ? '#1D9E75' : sc >= 0.5 ? '#BA7517' : '#E24B4A';
      const own = name.includes('ALUXE') && !name.includes('JOY');
      const themes = (d.top_themes || []).map(t => `<span class="tag">${t}</span>`).join('');
      const sources = (d.sources || []).map(s => `<span class="src-tag">${s}</span>`).join('');
      const alert = d.alert ? `<div class="alert-box">${d.alert}</div>` : '';
      const posQ = d.sample_positive ? `<div class="quote pos-q">"${d.sample_positive}"</div>` : '';
      const negQ = d.sample_negative ? `<div class="quote neg-q">"${d.sample_negative}"</div>` : '';
      cardsHtml += `<div class="bc ${own ? 'own' : 'comp'}">
        <div class="bh"><span class="bn">${name}</span>
          <span style="font-size:20px;font-weight:500;color:${col}">${sc.toFixed(2)}</span></div>
        ${own ? '<span class="own-badge">自家品牌</span>' : ''}
        <div class="sources">${sources}</div>
        <div class="bbar">
          <div style="width:${d.positive_pct||0}%;background:#1D9E75"></div>
          <div style="width:${d.neutral_pct||0}%;background:#D3D1C7"></div>
          <div style="width:${d.negative_pct||0}%;background:#E24B4A"></div>
        </div>
        <div class="blbl">
          <span style="color:#1D9E75">正 ${d.positive_pct||0}%</span>
          <span style="color:#888">中 ${d.neutral_pct||0}%</span>
          <span style="color:#E24B4A">負 ${d.negative_pct||0}%</span>
          <span style="color:#aaa;margin-left:auto">${d.review_count||0} 則</span>
        </div>
        <div class="themes">${themes}</div>
        ${alert}${posQ}${negQ}
      </div>`;
    });
    html += `<div class="sec">
      <div class="sec-label">品牌情感分析 · 自家品牌 &amp; 競品</div>
      <div class="grid">${cardsHtml}</div>
      <div class="ts">資料區間：近 14 天 · 來源：Google Maps 評論</div>
    </div>`;
  }

  // 競品負評預警
  const alerts = data.competitor_alerts || [];
  let alertsHtml = alerts.length
    ? alerts.map(a => `<div class="ai">
        <div style="font-size:13px;font-weight:500;color:${(a.severity||1)>=4?'#E24B4A':'#BA7517'}">
          ${a.brand} <span style="font-size:11px;font-weight:400;margin-left:8px">嚴重度 ${a.severity}/5</span></div>
        <div style="font-size:13px;color:#3D3A32;margin:4px 0">${a.issue}</div>
        <div style="font-size:12px;color:#1D9E75">機會：${a.opportunity}</div></div>`).join('')
    : '<p style="color:#7A7669;font-size:13px">本週無預警</p>';
  html += `<div class="sec"><div class="sec-label">競品負評預警</div>${alertsHtml}</div>`;

  // 熱門議題
  const topics = data.hot_topics || [];
  if (topics.length) {
    const topicsHtml = topics.map(t => `<div class="ti">
      <div style="font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;margin-bottom:4px">
        ${t.topic}
        ${t.actionable ? '<span class="act-badge">可介入</span>' : ''}
        <span style="font-size:11px;color:${t.volume==='high'?'#1D9E75':'#BA7517'}">${(t.volume||'').toUpperCase()}</span>
      </div>
      <div style="font-size:12px;color:#7A7669">${t.suggestion||''}</div></div>`).join('');
    html += `<div class="sec"><div class="sec-label">熱門議題 · 可操作清單</div>${topicsHtml}</div>`;
  }

  // GSC（SG 專屬）
  const gsc = data.gsc_insights || {};
  if (gsc.top_keywords && gsc.top_keywords.length) {
    const rows = gsc.top_keywords.slice(0,10).map(k =>
      `<tr><td style="padding:6px 8px;font-size:12px">${k.keyword}</td>
       <td style="padding:6px 8px;font-size:12px;text-align:right">${k.clicks.toLocaleString()}</td>
       <td style="padding:6px 8px;font-size:12px;text-align:right">${k.impressions.toLocaleString()}</td>
       <td style="padding:6px 8px;font-size:12px;text-align:right">${k.ctr}%</td>
       <td style="padding:6px 8px;font-size:12px;text-align:right">#${k.position}</td></tr>`).join('');
    html += `<div class="sec"><div class="sec-label">Google Search Console · 前10大關鍵字</div>
      <table style="width:100%;border-collapse:collapse">
        <thead><tr style="border-bottom:0.5px solid var(--border)">
          <th style="padding:6px 8px;text-align:left;font-weight:500;color:#7A7669;font-size:12px">關鍵字</th>
          <th style="padding:6px 8px;text-align:right;font-weight:500;color:#7A7669;font-size:12px">點擊</th>
          <th style="padding:6px 8px;text-align:right;font-weight:500;color:#7A7669;font-size:12px">曝光</th>
          <th style="padding:6px 8px;text-align:right;font-weight:500;color:#7A7669;font-size:12px">CTR</th>
          <th style="padding:6px 8px;text-align:right;font-weight:500;color:#7A7669;font-size:12px">排名</th>
        </tr></thead><tbody>${rows}</tbody></table>
    </div>`;
  } else if (marketId === 'sg') {
    html += `<div class="sec"><div class="sec-label">Google Search Console · 前10大關鍵字</div>
      <p style="color:#7A7669;font-size:13px">GSC 資料待串接</p></div>`;
  }

  // Google Trends
  const trends = data.market_trends || [];
  if (trends.length) {
    const trendsHtml = trends.map(t => `<div class="ti">
      <div style="font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;margin-bottom:4px">
        ${t.keyword}
        <span style="font-size:11px;color:${t.trend==='rising'?'#1D9E75':t.trend==='falling'?'#E24B4A':'#888'}">
          ${t.trend==='rising'?'↑ 上升':t.trend==='falling'?'↓ 下降':'→ 穩定'}
        </span>
      </div>
      <div style="font-size:12px;color:#7A7669">${t.insight||''}</div></div>`).join('');
    html += `<div class="sec"><div class="sec-label">市場搜尋趨勢 · Google Trends</div>${trendsHtml}</div>`;
  }

  // 本週優先行動
  const actions = data.actionable_top3 || [];
  if (actions.length) {
    const actHtml = actions.map((a,i) =>
      `<div class="action-item"><span class="anum">${i+1}</span><span>${a}</span></div>`).join('');
    html += `<div class="sec">
      <div class="sec-label">本週優先行動 Top 3</div>
      ${actHtml}
      <a class="ext-link" href="${SHEETS_URL}" target="_blank">歷史數據 Google Sheets</a>
    </div>`;
  }

  return html;
}

// ── Tab 切換 ──────────────────────────────────────────

const loadedMarkets = {};

function switchTab(marketId, btn) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + marketId).classList.add('active');
  btn.classList.add('active');
  loadMarket(marketId);
}

function loadMarket(marketId) {
  if (loadedMarkets[marketId]) return;
  loadedMarkets[marketId] = true;

  const container = document.getElementById('content-' + marketId);
  container.innerHTML = '<p class="loading">資料載入中...</p>';

  const market = window._markets.find(m => m.id === marketId);
  if (!market) return;

  fetch(market.data_file + '?t=' + Date.now())
    .then(r => r.ok ? r.json() : Promise.reject('資料尚未生成'))
    .then(data => {
      container.innerHTML = renderMarket(data, marketId);
    })
    .catch(() => {
      container.innerHTML = `<p class="loading">⚠️ ${market.label} 資料尚未生成</p>`;
    });
}

// ── 初始化：讀取 config.json ─────────────────────────

fetch('config.json?t=' + Date.now())
  .then(r => r.json())
  .then(config => {
    const markets = config.markets.filter(m => m.active);
    window._markets = markets;

    const tabBar = document.getElementById('tab-bar');
    const tabContents = document.getElementById('tab-contents');

    markets.forEach((market, i) => {
      // Tab 按鈕
      const btn = document.createElement('button');
      btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
      btn.textContent = market.label;
      btn.onclick = () => switchTab(market.id, btn);
      tabBar.appendChild(btn);

      // Tab 內容區
      const div = document.createElement('div');
      div.id = 'tab-' + market.id;
      div.className = 'tab-content' + (i === 0 ? ' active' : '');
      div.innerHTML = `<div class="wrap"><div id="content-${market.id}"></div></div>`;
      tabContents.appendChild(div);
    });

    // 載入第一個地區
    if (markets.length > 0) loadMarket(markets[0].id);
  })
  .catch(() => {
    document.getElementById('tab-contents').innerHTML =
      '<div class="wrap"><p class="loading">⚠️ 無法讀取設定檔</p></div>';
  });
</script>
</body>
</html>
